# ============================================================================
# environment_ubuntu22_docker.yaml — run the cpu-free-ubuntu snapshot in Docker
# on the ale-ubuntu22-docker image (a byte-for-byte export of the ale-ubuntu22
# GCE VM, so paths + cua-server port 5000 match the GCE image). Same structure
# as environment.yaml; only the cpu-free-ubuntu routing differs.
# ============================================================================

snapshots:

  cpu-free-ubuntu:
    provider: docker
    image: ale-ubuntu22-docker   # container ref + port (5000) come from the Image entry
    docker:
      cpus: 4
      memory: 16g
      shm_size: 2g

task_data_source: gs://ale-data-public
# ale-ubuntu22-docker has no baked GCS SA — uncomment to stage gs:// in-container:
# gcs_sa_key: secret/gcp_key.json
output_path: local
