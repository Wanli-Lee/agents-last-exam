<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALE 任务复盘 · Agentic Lab Eval</title>
<style>
:root{
  --bg:#f6f5f1; --panel:#fffefb; --ink:#1c1b18; --ink-soft:#56524a; --ink-faint:#8a857a;
  --line:#e6e2d8; --line-soft:#efece4; --accent:#7a4419; --accent-soft:#b07a3e;
  --gold:#bb8a2e; --shadow:0 1px 2px rgba(40,33,20,.04),0 8px 24px -12px rgba(40,33,20,.12);
  --ok:#2f6f4f; --ok-bg:#e7f1ea; --partial:#9a6a1a; --partial-bg:#f6eed9;
  --fail:#9c3a31; --fail-bg:#f6e6e2; --infra:#5a5550; --infra-bg:#ece9e2;
  --norun:#6a6a8a; --norun-bg:#eaeaf2;
  --r:14px; --serif:"Songti SC","Noto Serif SC",Georgia,"Times New Roman",serif;
  --sans:-apple-system,"PingFang SC","Noto Sans SC","Helvetica Neue",Arial,sans-serif;
  --mono:"SF Mono","JetBrains Mono","Menlo",Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.6;
  -webkit-font-smoothing:antialiased;font-feature-settings:"tnum"}
.wrap{max-width:1280px;margin:0 auto;padding:0 28px}

/* ===== Header ===== */
header{padding:46px 0 26px;border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:18px}
.brand h1{font-family:var(--serif);font-size:34px;font-weight:600;letter-spacing:.5px;
  color:var(--ink);line-height:1.15}
.brand h1 .en{display:block;font-family:var(--sans);font-size:13px;font-weight:500;
  letter-spacing:3px;text-transform:uppercase;color:var(--accent-soft);margin-bottom:8px}
.sub{font-size:14px;color:var(--ink-soft);margin-top:10px;max-width:640px}
.sub b{color:var(--accent);font-weight:600}
.meta-tags{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.mtag{font-size:12px;font-family:var(--mono);color:var(--ink-faint);
  border:1px solid var(--line);border-radius:999px;padding:4px 12px;background:var(--panel)}

/* ===== Stats ===== */
.stats{display:grid;grid-template-columns:1.1fr 1.5fr;gap:20px;margin:28px 0 8px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.stat-nums{padding:22px 24px;display:flex;flex-direction:column;gap:18px}
.stat-top{display:flex;align-items:baseline;gap:14px}
.stat-top .big{font-family:var(--serif);font-size:52px;font-weight:600;line-height:1;color:var(--ink)}
.stat-top .lbl{font-size:13px;color:var(--ink-faint)}
.score-bar{display:flex;height:14px;border-radius:7px;overflow:hidden;border:1px solid var(--line-soft)}
.score-bar i{display:block;height:100%}
.score-legend{display:flex;flex-wrap:wrap;gap:14px 20px;margin-top:2px}
.score-legend span{font-size:12.5px;color:var(--ink-soft);display:flex;align-items:center;gap:7px}
.dot{width:9px;height:9px;border-radius:3px;flex:none}
.dist{padding:20px 24px}
.dist h3{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-faint);
  font-weight:600;margin-bottom:16px}
.bar-row{display:flex;align-items:center;gap:12px;margin-bottom:9px;cursor:pointer}
.bar-row:hover .bar-name{color:var(--accent)}
.bar-name{width:96px;font-size:13px;color:var(--ink-soft);text-align:right;flex:none;
  white-space:nowrap;transition:color .15s}
.bar-track{flex:1;height:18px;background:var(--line-soft);border-radius:5px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--accent-soft),var(--accent));
  transition:width .5s cubic-bezier(.2,.7,.3,1)}
.bar-val{width:30px;font-size:12px;font-family:var(--mono);color:var(--ink-faint);flex:none}

/* ===== Controls ===== */
.controls{position:sticky;top:0;z-index:40;background:rgba(246,245,241,.86);
  backdrop-filter:blur(10px);border-bottom:1px solid var(--line);margin-top:30px;
  padding:14px 0}
.controls .wrap{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.search{flex:1;min-width:200px;position:relative}
.search input{width:100%;border:1px solid var(--line);background:var(--panel);
  border-radius:10px;padding:10px 14px 10px 38px;font-size:14px;font-family:var(--sans);color:var(--ink)}
.search input:focus{outline:none;border-color:var(--accent-soft);box-shadow:0 0 0 3px rgba(176,122,62,.12)}
.search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.4}
.sel{position:relative}
.sel select{appearance:none;border:1px solid var(--line);background:var(--panel);
  border-radius:10px;padding:10px 34px 10px 14px;font-size:13.5px;color:var(--ink-soft);
  font-family:var(--sans);cursor:pointer}
.sel select:focus{outline:none;border-color:var(--accent-soft)}
.sel::after{content:"▾";position:absolute;right:13px;top:50%;transform:translateY(-50%);
  pointer-events:none;color:var(--ink-faint);font-size:11px}
.count-pill{font-size:13px;color:var(--ink-faint);font-family:var(--mono);white-space:nowrap}
.reset{font-size:13px;color:var(--accent);cursor:pointer;border:none;background:none;
  text-decoration:underline;text-underline-offset:3px}

/* ===== Verdict chips filter row ===== */
.vfilter{display:flex;gap:8px;flex-wrap:wrap;padding:16px 0 2px}
.vchip{font-size:12.5px;padding:6px 13px;border-radius:999px;border:1px solid var(--line);
  background:var(--panel);color:var(--ink-soft);cursor:pointer;display:flex;align-items:center;
  gap:7px;transition:all .15s;user-select:none}
.vchip .c{width:8px;height:8px;border-radius:3px}
.vchip .n{font-family:var(--mono);font-size:11px;opacity:.7}
.vchip:hover{border-color:var(--accent-soft)}
.vchip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.vchip.on .n{opacity:.85}

/* ===== Grid ===== */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:18px;
  padding:24px 0 60px}
.case{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);
  box-shadow:var(--shadow);padding:20px;cursor:pointer;transition:transform .16s,box-shadow .16s,border-color .16s;
  display:flex;flex-direction:column;gap:13px;position:relative;overflow:hidden}
.case::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--vc,var(--accent-soft))}
.case:hover{transform:translateY(-3px);box-shadow:0 4px 8px rgba(40,33,20,.06),0 18px 40px -16px rgba(40,33,20,.22);
  border-color:var(--line)}
.case-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.case-title{font-family:var(--serif);font-size:18px;font-weight:600;line-height:1.3;color:var(--ink)}
.case-id{font-family:var(--mono);font-size:11px;color:var(--ink-faint);margin-top:5px;
  word-break:break-all;line-height:1.4}
.scoremark{flex:none;text-align:center;min-width:58px}
.scoremark .v{font-family:var(--serif);font-size:26px;font-weight:600;line-height:1}
.scoremark .t{font-size:10px;color:var(--ink-faint);margin-top:3px;letter-spacing:1px}
.case-sum{font-size:13px;color:var(--ink-soft);line-height:1.65;display:-webkit-box;
  -webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.badges{display:flex;gap:7px;flex-wrap:wrap;margin-top:auto;align-items:center}
.badge{font-size:11.5px;padding:3px 10px;border-radius:6px;font-weight:500;white-space:nowrap}
.b-domain{background:var(--line-soft);color:var(--ink-soft)}
.b-tier{border:1px solid var(--line);color:var(--ink-faint)}
.b-verdict{font-weight:600}
.case-foot{display:flex;gap:14px;font-size:11.5px;color:var(--ink-faint);font-family:var(--mono);
  border-top:1px dashed var(--line);padding-top:11px}
.case-foot span{display:flex;align-items:center;gap:4px}

/* verdict colors */
.vk-ok{color:var(--ok)} .vbg-ok{background:var(--ok-bg);color:var(--ok)}
.vk-partial{color:var(--partial)} .vbg-partial{background:var(--partial-bg);color:var(--partial)}
.vk-fail{color:var(--fail)} .vbg-fail{background:var(--fail-bg);color:var(--fail)}
.vk-infra{color:var(--infra)} .vbg-infra{background:var(--infra-bg);color:var(--infra)}
.vk-norun{color:var(--norun)} .vbg-norun{background:var(--norun-bg);color:var(--norun)}

/* ===== Modal ===== */
.overlay{position:fixed;inset:0;background:rgba(28,27,24,.42);backdrop-filter:blur(3px);
  z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.show{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;bottom:0;width:min(760px,94vw);background:var(--bg);
  z-index:101;transform:translateX(100%);transition:transform .28s cubic-bezier(.3,.7,.2,1);
  display:flex;flex-direction:column;box-shadow:-20px 0 60px -20px rgba(40,33,20,.4)}
.drawer.show{transform:translateX(0)}
.d-head{padding:24px 30px 18px;border-bottom:1px solid var(--line);background:var(--panel);position:relative}
.d-close{position:absolute;top:20px;right:24px;width:34px;height:34px;border-radius:9px;
  border:1px solid var(--line);background:var(--bg);cursor:pointer;font-size:18px;color:var(--ink-soft);
  display:flex;align-items:center;justify-content:center;transition:.15s}
.d-close:hover{background:var(--fail-bg);color:var(--fail);border-color:transparent}
.d-eyebrow{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.d-title{font-family:var(--serif);font-size:25px;font-weight:600;line-height:1.25;padding-right:40px}
.d-id{font-family:var(--mono);font-size:12px;color:var(--ink-faint);margin-top:8px;word-break:break-all}
.d-scoreline{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;align-items:center}
.d-metric{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:7px 13px;
  font-size:12px;color:var(--ink-soft);font-family:var(--mono);display:flex;gap:7px;align-items:center}
.d-metric b{color:var(--ink);font-weight:600}
.d-body{flex:1;overflow-y:auto;padding:8px 30px 60px}
.sec{margin-top:26px}
.sec-h{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sec-h .ic{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;
  font-size:14px;flex:none}
.sec-h h3{font-family:var(--serif);font-size:17px;font-weight:600;color:var(--ink)}
.prose{font-size:14.5px;line-height:1.85;color:var(--ink);background:var(--panel);
  border:1px solid var(--line);border-radius:12px;padding:18px 20px;
  white-space:pre-wrap;word-break:break-word}
.prose.score-prose{border-left:4px solid var(--accent-soft)}
.kv{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.kv .item{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:11px 14px}
.kv .item .k{font-size:11px;color:var(--ink-faint);letter-spacing:.5px;margin-bottom:3px}
.kv .item .v{font-size:13.5px;color:var(--ink);font-family:var(--mono);word-break:break-all}
.chips{display:flex;gap:7px;flex-wrap:wrap}
.chip2{font-size:12px;padding:4px 11px;border-radius:7px;background:var(--panel);
  border:1px solid var(--line);color:var(--ink-soft);font-family:var(--mono)}
.files{display:flex;flex-direction:column;gap:6px}
.file{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--ink-soft);
  background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-family:var(--mono)}
.file .fi{opacity:.5}
.acts{display:flex;gap:8px;flex-wrap:wrap}
.act{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:8px 13px;
  font-size:12.5px;font-family:var(--mono);color:var(--ink-soft);display:flex;gap:7px;align-items:center}
.act b{color:var(--accent);font-weight:600}
details.raw{margin-top:12px;background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
details.raw summary{padding:12px 16px;cursor:pointer;font-size:13px;color:var(--ink-soft);
  font-weight:500;list-style:none;display:flex;align-items:center;gap:9px;user-select:none}
details.raw summary::-webkit-details-marker{display:none}
details.raw summary .arw{transition:transform .2s;font-size:11px;color:var(--ink-faint)}
details.raw[open] summary .arw{transform:rotate(90deg)}
details.raw summary:hover{background:var(--line-soft)}
details.raw pre{margin:0;padding:16px;border-top:1px solid var(--line);overflow-x:auto;
  font-family:var(--mono);font-size:12px;line-height:1.7;color:var(--ink);
  white-space:pre-wrap;word-break:break-word;background:#fcfbf7;max-height:460px;overflow-y:auto}

.empty{text-align:center;padding:80px 20px;color:var(--ink-faint)}
.empty .big{font-family:var(--serif);font-size:22px;margin-bottom:8px;color:var(--ink-soft)}
footer{border-top:1px solid var(--line);padding:24px 0;text-align:center;font-size:12px;
  color:var(--ink-faint);font-family:var(--mono)}

@media(max-width:880px){
  .stats{grid-template-columns:1fr}
  .wrap{padding:0 18px}
  .brand h1{font-size:27px}
  .grid{grid-template-columns:1fr}
}
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-thumb{background:#d8d2c4;border-radius:6px;border:3px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:#c4bca8}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="brand">
      <div>
        <h1><span class="en">Agentic Lab Eval · Case Review</span>ALE 任务复盘</h1>
        <p class="sub">对 <b>gpt-5.5</b> 在 ALE 基准(arXiv 2606.05405)<b>105 项</b>真实研究级编程任务上的逐例中文深度分析——任务设定、评分逻辑、执行轨迹与得分归因。</p>
      </div>
      <div class="meta-tags">
        <span class="mtag">openai-gpt-5-5</span>
        <span class="mtag">12 领域</span>
        <span class="mtag">3 难度档</span>
      </div>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="stats">
    <div class="card stat-nums">
      <div class="stat-top"><div class="big" id="totalN">·</div><div class="lbl">项任务<br>已分析</div></div>
      <div>
        <div class="score-bar" id="scoreBar"></div>
        <div class="score-legend" id="scoreLegend"></div>
      </div>
    </div>
    <div class="card dist">
      <h3>领域分布 · Domain</h3>
      <div id="domainBars"></div>
    </div>
  </div>
</div>

<div class="controls">
  <div class="wrap">
    <label class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="q" type="text" placeholder="搜索任务标题、ID、领域、摘要…">
    </label>
    <div class="sel"><select id="fDomain"></select></div>
    <div class="sel"><select id="fTier"></select></div>
    <div class="sel"><select id="fSort">
      <option value="score-desc">得分 高→低</option>
      <option value="score-asc">得分 低→高</option>
      <option value="domain">按领域</option>
      <option value="title">按标题</option>
    </select></div>
    <span class="count-pill" id="countPill"></span>
    <button class="reset" id="reset">重置</button>
  </div>
</div>

<div class="wrap">
  <div class="vfilter" id="vfilter"></div>
  <div class="grid" id="grid"></div>
</div>

<footer><div class="wrap">ALE Case Review · 105 cases · 浅色学术报告风 · 数据 gpt-5.5 / ale_claw</div></footer>

<script>
const DOMAIN_CN={health_medicine:"医学健康",computing_math:"计算数学",life_sciences:"生命科学",
  business_finance:"商业金融",physical_sciences:"物理科学",engineering:"工程",education_info:"教育信息",
  transport_safety:"交通安全",legal:"法律",psychology_neuro:"心理神经",social_sciences:"社会科学",other:"其他"};
const TIER_CN={"full-spectrum":"全谱","last-exam":"终极考","near-term":"近期"};
const VERDICTS=[
  {k:"满分",cls:"ok",c:"var(--ok)"},
  {k:"部分分-差一点",cls:"partial",c:"var(--partial)"},
  {k:"部分分-能力边界",cls:"partial",c:"var(--gold)"},
  {k:"0分-真实失败",cls:"fail",c:"var(--fail)"},
  {k:"0分-基础设施问题",cls:"infra",c:"var(--infra)"},
  {k:"0分-数据缺失",cls:"infra",c:"#7a746c"},
  {k:"未运行",cls:"norun",c:"var(--norun)"},
];
const VCLS={}; VERDICTS.forEach(v=>VCLS[v.k]=v);
const esc=s=>String(s==null?"":s).replace(/[&<>]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m]));
const fmtScore=s=>s==null?"—":(Math.abs(s-Math.round(s))<1e-9?String(Math.round(s)):s.toFixed(2));
const fmtDur=s=>s==null?"—":(s>=3600?(s/3600).toFixed(1)+"h":Math.round(s/60)+"m");

let DATA=[], state={q:"",domain:"",tier:"",sort:"score-desc",verdicts:new Set()};

function verdictOf(c){return (c.analysis&&c.analysis.verdict)||"未运行";}
function scoreColor(c){
  if(c.score==null) return "var(--norun)";
  if(c.score>=0.999) return "var(--ok)";
  if(c.score>0) return "var(--partial)";
  return "var(--fail)";
}

async function boot(){
  const r=await fetch('data/cases_full.json'); DATA=await r.json();
  buildStats(); buildFilters(); buildVChips(); render();
}

function buildStats(){
  document.getElementById('totalN').textContent=DATA.length;
  // score buckets
  const full=DATA.filter(c=>c.score>=0.999).length;
  const partial=DATA.filter(c=>c.score>0&&c.score<0.999).length;
  const zero=DATA.filter(c=>c.score===0).length;
  const norun=DATA.filter(c=>c.score==null).length;
  const buckets=[
    {n:"满分 (1.0)",v:full,c:"var(--ok)"},
    {n:"部分分",v:partial,c:"var(--partial)"},
    {n:"零分 (0.0)",v:zero,c:"var(--fail)"},
    {n:"未运行",v:norun,c:"var(--norun)"},
  ];
  const tot=DATA.length;
  document.getElementById('scoreBar').innerHTML=buckets.map(b=>
    `<i style="width:${b.v/tot*100}%;background:${b.c}"></i>`).join('');
  document.getElementById('scoreLegend').innerHTML=buckets.map(b=>
    `<span><i class="dot" style="background:${b.c}"></i>${b.n} <b style="font-family:var(--mono);color:var(--ink)">${b.v}</b></span>`).join('');
  // domain bars
  const dm={}; DATA.forEach(c=>dm[c.domain]=(dm[c.domain]||0)+1);
  const arr=Object.entries(dm).sort((a,b)=>b[1]-a[1]); const mx=arr[0][1];
  document.getElementById('domainBars').innerHTML=arr.map(([d,n])=>
    `<div class="bar-row" data-domain="${d}">
       <div class="bar-name">${DOMAIN_CN[d]||d}</div>
       <div class="bar-track"><div class="bar-fill" style="width:${n/mx*100}%"></div></div>
       <div class="bar-val">${n}</div></div>`).join('');
  document.querySelectorAll('.bar-row').forEach(r=>r.onclick=()=>{
    const d=r.dataset.domain; state.domain=state.domain===d?"":d;
    document.getElementById('fDomain').value=state.domain; render();});
}

function buildFilters(){
  const dm={}; DATA.forEach(c=>dm[c.domain]=(dm[c.domain]||0)+1);
  const dsel=document.getElementById('fDomain');
  dsel.innerHTML=`<option value="">全部领域 (${DATA.length})</option>`+
    Object.entries(dm).sort((a,b)=>b[1]-a[1]).map(([d,n])=>
    `<option value="${d}">${DOMAIN_CN[d]||d} (${n})</option>`).join('');
  const tm={}; DATA.forEach(c=>tm[c.tier]=(tm[c.tier]||0)+1);
  const tsel=document.getElementById('fTier');
  tsel.innerHTML=`<option value="">全部难度</option>`+
    Object.entries(tm).map(([t,n])=>`<option value="${t}">${TIER_CN[t]||t} (${n})</option>`).join('');
  dsel.onchange=e=>{state.domain=e.target.value;render();};
  tsel.onchange=e=>{state.tier=e.target.value;render();};
  document.getElementById('fSort').onchange=e=>{state.sort=e.target.value;render();};
  document.getElementById('q').oninput=e=>{state.q=e.target.value.toLowerCase();render();};
  document.getElementById('reset').onclick=()=>{
    state={q:"",domain:"",tier:"",sort:"score-desc",verdicts:new Set()};
    document.getElementById('q').value="";document.getElementById('fDomain').value="";
    document.getElementById('fTier').value="";document.getElementById('fSort').value="score-desc";
    buildVChips();render();};
}

function buildVChips(){
  const vm={}; DATA.forEach(c=>{const v=verdictOf(c);vm[v]=(vm[v]||0)+1;});
  document.getElementById('vfilter').innerHTML=VERDICTS.filter(v=>vm[v.k]).map(v=>
    `<div class="vchip ${state.verdicts.has(v.k)?'on':''}" data-v="${v.k}">
       <i class="c" style="background:${v.c}"></i>${v.k}<span class="n">${vm[v.k]}</span></div>`).join('');
  document.querySelectorAll('.vchip').forEach(ch=>ch.onclick=()=>{
    const v=ch.dataset.v;
    if(state.verdicts.has(v))state.verdicts.delete(v);else state.verdicts.add(v);
    buildVChips();render();});
}

function filtered(){
  let a=DATA.filter(c=>{
    if(state.domain&&c.domain!==state.domain)return false;
    if(state.tier&&c.tier!==state.tier)return false;
    if(state.verdicts.size&&!state.verdicts.has(verdictOf(c)))return false;
    if(state.q){
      const hay=(c.task_id+" "+(c.analysis?.title_cn||c.title)+" "+c.title+" "+
        (DOMAIN_CN[c.domain]||"")+" "+(c.summary||"")+" "+(c.analysis?.task_desc_cn||"")).toLowerCase();
      if(!hay.includes(state.q))return false;
    }
    return true;});
  const sc=c=>c.score==null?-1:c.score;
  if(state.sort==="score-desc")a.sort((x,y)=>sc(y)-sc(x));
  else if(state.sort==="score-asc")a.sort((x,y)=>sc(x)-sc(y));
  else if(state.sort==="domain")a.sort((x,y)=>(x.domain).localeCompare(y.domain)||sc(y)-sc(x));
  else if(state.sort==="title")a.sort((x,y)=>(x.analysis?.title_cn||x.title).localeCompare(y.analysis?.title_cn||y.title,'zh'));
  return a;
}

function render(){
  const a=filtered();
  document.getElementById('countPill').textContent=`${a.length} / ${DATA.length}`;
  const g=document.getElementById('grid');
  if(!a.length){g.innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="big">没有匹配的任务</div><div>试试调整筛选条件或重置</div></div>`;return;}
  g.innerHTML=a.map((c,i)=>{
    const v=VCLS[verdictOf(c)]||VCLS["未运行"];
    const ac=c.action_counts||{};
    const acStr=Object.entries(ac).slice(0,3).map(([k,n])=>`${k}·${n}`).join(' ');
    return `<div class="case" data-id="${esc(c.task_id)}" style="--vc:${v.c}">
      <div class="case-top">
        <div>
          <div class="case-title">${esc(c.analysis?.title_cn||c.title)}</div>
          <div class="case-id">${esc(c.task_id)}</div>
        </div>
        <div class="scoremark">
          <div class="v" style="color:${scoreColor(c)}">${fmtScore(c.score)}</div>
          <div class="t">SCORE</div>
        </div>
      </div>
      <div class="case-sum">${esc(c.summary||c.analysis?.task_desc_cn||"")}</div>
      <div class="badges">
        <span class="badge b-domain">${DOMAIN_CN[c.domain]||c.domain}</span>
        <span class="badge b-tier">${TIER_CN[c.tier]||c.tier}</span>
        <span class="badge b-verdict vbg-${v.cls}">${v.k}</span>
      </div>
      <div class="case-foot">
        <span title="执行步数">◷ ${c.run_steps??"—"} 步</span>
        <span title="净执行时间(不含排队等环境)">⧗ ${fmtDur(c.exec_duration_s)}</span>
        <span title="动作">⚙ ${acStr||"—"}</span>
      </div>
    </div>`;}).join('');
  document.querySelectorAll('.case').forEach(el=>el.onclick=()=>{
    location.href='case.html?id='+encodeURIComponent(el.dataset.id);});
}

boot();
</script>
</body>
</html>
